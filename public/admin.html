<!DOCTYPE html>
<html lang="es">
<head>
<link
rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"
/>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AndesTrack Admin</title>

<script
src="https://unpkg.com/leaflet/dist/leaflet.js">
</script>
<style>

.btn-historial{

    background:#1e293b;

    border:none;

    color:white;

    padding:10px 18px;

    border-radius:14px;

    font-size:14px;

    font-weight:700;

    cursor:pointer;

    transition:0.3s;

}

.btn-historial:hover{

    background:#334155;

    transform:scale(1.05);

}

.acciones{
    display:flex;
    flex-wrap:wrap;
    gap:10px;
    margin-top:15px;
}

.acciones button{
    border:none;
    border-radius:14px;
    padding:10px 18px;
    font-weight:bold;
    color:white;
    cursor:pointer;
    font-size:14px;
}

.btn-on{
    background:#22c55e;
}

.btn-off{
    background:#ef4444;
}

.btn-bloq{
    background:#334155;
}

.btn-free{
    background:#475569;
}

.btn-gps{
    background:#2563eb;
}

.btn-eliminar{
    background:#dc2626;
    width:100%;
}
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', sans-serif;
}

body{

    width:100%;
    height:100vh;
    overflow:hidden;

    background:linear-gradient(
        135deg,
        #0f172a,
        #111827
    );

}

#map{

    width:100%;
    height:100vh;

    filter:
        saturate(1.02)
        contrast(1)
        brightness(0.98);

}

.panel{

    position:absolute;

    top:18px;
    left:18px;

    width:420px;
    height:94vh;

    overflow-y:auto;

    padding:22px;

    border-radius:30px;

    z-index:9999;

    background:rgba(15,23,42,0.84);

    backdrop-filter:blur(18px);

    border:1px solid rgba(255,255,255,0.08);

    box-shadow:
        0 0 40px rgba(0,255,213,0.10),
        0 0 70px rgba(0,0,0,0.30);

}

.titulo{

    text-align:center;

    margin-bottom:5px;

    font-size:48px;

    font-weight:900;

    background:linear-gradient(
        90deg,
        #ffffff,
        #7fffd4,
        #00ffd5
    );

    -webkit-background-clip:text;

    -webkit-text-fill-color:transparent;

}

.subtitulo{

    text-align:center;

    color:#9be7d8;

    font-size:13px;

    margin-bottom:24px;

    letter-spacing:1px;

}

.panel input,
.panel select{

    width:100%;

    padding:16px;

    margin-bottom:16px;

    border:none;

    border-radius:16px;

    background:#172036;

    color:white;

    font-size:15px;

    outline:none;

    transition:0.3s;

    box-shadow:
        inset 0 0 10px rgba(0,0,0,0.25);

}

.panel input:focus,
.panel select:focus{

    border:1px solid #00ffd5;

    box-shadow:
        0 0 14px rgba(0,255,213,0.20);

}

.panel input::placeholder{

    color:#94a3b8;

}

.btn-crear{

    width:100%;

    padding:16px;

    border:none;

    border-radius:18px;

    background:linear-gradient(
        90deg,
        #19e3c4,
        #17d8ff
    );

    color:#0f172a;

    font-size:16px;

    font-weight:900;

    letter-spacing:1px;

    cursor:pointer;

    transition:0.3s;

    margin-bottom:24px;

    box-shadow:
        0 0 18px rgba(0,255,213,0.18);

}

.btn-crear:hover{

    transform:scale(1.02);

    opacity:0.94;

}

.buscador-admin{

    width:100%;

    padding:10px 14px;

    margin-top:12px;

    margin-bottom:18px;

    border:none;

    border-radius:14px;

    background:rgba(255,255,255,0.06);

    color:white;

    font-size:13px;

    outline:none;

    backdrop-filter:blur(10px);

    border:1px solid rgba(255,255,255,0.05);

}

.buscador-admin::placeholder{

    color:#cbd5e1;

}

.buscador-admin:focus{

    border:1px solid #00ffd5;

    box-shadow:
        0 0 10px rgba(0,255,213,0.25);

}
.cliente{

    background:rgba(10,20,50,0.92);

    border-radius:20px;

    padding:16px;

    margin-top:16px;

    color:white;

    position:relative;

    overflow:hidden;

    box-shadow:
        0 0 25px rgba(0,0,0,0.35);

    border-left:6px solid #19e3c4;

    transition:0.4s;

}
border-left:5px solid transparent;
.cliente.activo{

    border-left:6px solid #19e3c4;

    box-shadow:
        0 0 18px rgba(25,227,196,0.30);

}

.cliente.apagado{

    border-left:6px solid #ff4d6d;

    box-shadow:
        0 0 18px rgba(255,77,109,0.20);

}


.cliente h3{

    font-size:24px;

    margin-bottom:8px;

    font-weight:900;

    color:white;

}

.cliente p{

    margin-bottom:4px;

    color:#e2e8f0;

    font-size:15px;

    font-weight:600;

}
.botones{

    display:flex;

    flex-wrap:wrap;

    gap:8px;

    margin-top:12px;

}

.botones button{

    border:none;

    border-radius:14px;

    padding:10px 14px;

    color:white;

    font-size:13px;

    font-weight:bold;

    cursor:pointer;

    transition:0.3s;

}

.botones button:hover{

    transform:scale(1.05);

}

.on{

    background:#22c55e;

}

.off{

    background:#ff5f7a;

}

.gps{

    background:#334155;

}

.free{

    background:#334155;

}

.delete{

    background:#ef4444;

}

::-webkit-scrollbar{

    width:7px;

}

::-webkit-scrollbar-thumb{

    background:#1e293b;

    border-radius:20px;

}
.btn-gps{

    background:linear-gradient(
        90deg,
        #8b5cf6,
        #6366f1
    );

    color:white;

    border:none;

    border-radius:14px;

    padding:10px 18px;

    font-weight:bold;

    box-shadow:
        0 0 15px rgba(139,92,246,0.35);

    transition:0.3s;

}

.btn-gps:hover{

    transform:scale(1.05);

}
.stats{

    display:flex;

    gap:12px;

    margin-bottom:18px;

}

.stat-box{

    flex:1;

    background:rgba(15,23,42,0.95);

    border-radius:18px;

    padding:14px;

    color:white;

    text-align:center;

    border:1px solid rgba(255,255,255,0.08);

    box-shadow:
        0 0 18px rgba(0,255,213,0.08);

}

.stat-box span{

    display:block;

    margin-top:8px;

    font-size:24px;

    font-weight:900;

    color:#19e3c4;

}
.btn-on:disabled{

    opacity:0.35;

    cursor:not-allowed;

    filter:grayscale(1);

}
</style>
</head>

<body>


<<div class="panel">

    <h1 class="titulo">AndesTrack</h1>

    <p class="subtitulo">
        Tecnología GPS Inteligente
    </p>

    <div class="stats">


        <div class="stat-box">
            📡 GPS
            <span id="totalGps">0</span>
        </div>

    </div>

    <div class="formulario">

        <input
        type="text"
        id="usuario"
        placeholder="Usuario"
        >

        <input
        type="password"
        id="password"
        placeholder="Contraseña"
        >

        <input
        type="number"
        id="gps"
        placeholder="GPS"
        >

        <input
        type="text"
        id="placa"
        placeholder="Placa"
        >

        <select id="tipo">

            <option value="auto">
                🚗 Automóvil
            </option>

            <option value="camion">
                🚚 Camión
            </option>

            <option value="bus">
                🚌 Bus
            </option>

            <option value="moto">
                🏍️ Motocicleta
            </option>

        </select>

        <button
class="btn-crear"
onclick="crearCliente()">
    ✨ Crear Cliente
</button>

<input
type="text"
id="buscadorVehiculo"
placeholder="🔍 Buscar por nombre o placa..."
class="buscador-admin"
oninput="filtrarVehiculos()"
>

</div>

<div id="clientes"></div>

</div>

<div id="map"></div>
<script>

const map = L.map('map').setView(
    [-1.83, -78.18],
    7
);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

let markers = [];

// ======================================
// ICONOS
// ======================================

function obtenerIcono(tipo){

    let iconoURL =
    'https://cdn-icons-png.flaticon.com/512/3202/3202926.png';

    let tamano = [42,42];

    // AUTO
    if(tipo === 'auto'){

        iconoURL =
        'https://cdn-icons-png.flaticon.com/512/744/744465.png';

        tamano = [42,42];

    }

    // BUS
    if(tipo === 'bus'){

        iconoURL =
        'https://cdn-icons-png.flaticon.com/512/3448/3448339.png';

        tamano = [48,48];

    }

    // MOTO
    if(tipo === 'moto'){

        iconoURL =
        'https://cdn-icons-png.flaticon.com/512/684/684908.png';

        tamano = [38,38];

    }

    // CAMION
    if(tipo === 'camion'){

        iconoURL =
        'https://cdn-icons-png.flaticon.com/512/819/819489.png';

        tamano = [50,50];

    }

    return L.icon({

        iconUrl: iconoURL,

        iconSize: tamano,

        iconAnchor: [
            tamano[0]/2,
            tamano[1]
        ],

        popupAnchor: [0, -40]

    });

}
// ======================================
// CARGAR CLIENTES
// ======================================

async function cargarClientes(){

    const res = await fetch('/vehiculos');

    const data = await res.json();

    // CONTADORES

    document.getElementById('totalGps').innerText =
    data.reduce((total,v)=>
        total + Number(v.gps),0
    );

    // LIMPIAR CLIENTES
    document.getElementById('clientes').innerHTML = '';

    // BORRAR MARKERS
    markers.forEach(m => map.removeLayer(m));

    markers = [];

    // RECORRER VEHICULOS
    data.forEach(v => {

        document.getElementById('clientes').innerHTML += `

<div class="cliente ${v.estado === 'activo' ? 'activo' : 'apagado'}">
                <h3>${v.usuario}</h3>

            <p>📡 GPS: ${v.gps}</p>

            <p>🚗 Placa: ${v.placa}</p>

            <p>📍 Tipo: ${v.tipo}</p>

            <p>🟢 Estado: ${v.estado}</p>

            <p>🔌 Motor: ${v.motor}</p>

            <p>🚀 Velocidad: ${v.velocidad} km/h</p>

            <p>🗺️ KM: ${Number(v.km).toFixed(2)}</p>

            <p>🌐 Lat: ${v.latitud}</p>

            <p>🌐 Lng: ${v.longitud}</p>

            <div class="acciones">

                <button
class="btn-on"
onclick="encenderMotor('${v.usuario}')"
${v.estado === 'bloqueado' ? 'disabled' : ''}>
🟢 ON
</button>


                <button
                class="btn-off"
                onclick="apagarMotor('${v.usuario}')">
                🔴 OFF
                </button>

                <button
                class="btn-bloq"
                onclick="bloquearVehiculo('${v.usuario}')">
                🔒 Bloq
                </button>

                <button
                class="btn-free"
                onclick="desbloquearVehiculo('${v.usuario}')">
                🔓 Free
                </button>

                <button
                class="btn-gps"
                onclick="verGPS(${v.latitud}, ${v.longitud}, '${v.usuario}')">
                📍 GPS
                </button>

                <button
                class="btn-eliminar"
                onclick="eliminarCliente(${v.id})">
                🗑️ Eliminar
                </button>

            </div>

        </div>

        `;

        // CREAR MARCADOR

        const marker = L.marker(
            [v.latitud, v.longitud],
            {
                icon: obtenerIcono(v.tipo)
            }
        ).addTo(map);

        marker.bindPopup(`

            <b>${v.usuario}</b><br>
            🚗 ${v.placa}<br>
            📍 ${v.tipo}<br>
            🟢 ${v.estado}<br>
            🔌 ${v.motor}<br>
            🚀 ${v.velocidad} km/h<br>
            🗺️ ${Number(v.km).toFixed(2)} km<br>
            🌐 LAT: ${v.latitud}<br>
            🌐 LNG: ${v.longitud}

        `);

        markers.push(marker);

    });

}
// ======================================
// CREAR CLIENTE
// ======================================

async function crearCliente(){

    const usuario =
    document.getElementById('usuario').value;

    const password =
    document.getElementById('password').value;

    const gps =
    document.getElementById('gps').value;

    const placa =
    document.getElementById('placa').value;

    const tipo =
    document.getElementById('tipo').value;

    await fetch('/vehiculos',{

        method:'POST',

        headers:{
            'Content-Type':'application/json'
        },

        body:JSON.stringify({

            usuario,
            password,
            gps,
            placa,
            tipo

        })

    });

    cargarClientes();

}

// ======================================
// ELIMINAR
// ======================================

async function eliminarCliente(id){

    await fetch('/vehiculos/' + id,{

        method:'DELETE'

    });

    cargarClientes();

}

// ======================================
// APAGAR
// ======================================

async function apagarMotor(id){

    await fetch('/vehiculos/' + id + '/motor', {

        method:'PUT',

        headers:{
            'Content-Type':'application/json'
        },

        body:JSON.stringify({

            motor:'apagado'

        })

    });

    cargarClientes();

}

// ======================================
// ENCENDER
// ======================================

async function encenderMotor(id){

    await fetch('/vehiculos/' + id + '/motor', {

        method:'PUT',

        headers:{
            'Content-Type':'application/json'
        },

        body: JSON.stringify({

            motor:'encendido'

        })

    });

    cargarClientes();

}

// ======================================
// BLOQUEAR
// ======================================

async function bloquearVehiculo(usuario){

    console.log(usuario);

    await fetch('/vehiculos/' + usuario + '/bloqueo', {

        method:'PUT',

        headers:{
            'Content-Type':'application/json'
        },

        body: JSON.stringify({

            bloqueo:'bloqueado'

        })

    });

    alert('Vehículo bloqueado');

    cargarClientes();

}

// ======================================
// DESBLOQUEAR
// ======================================

async function desbloquearVehiculo(usuario){

    await fetch('/vehiculos/' + usuario + '/bloqueo', {

        method:'PUT',

        headers:{
            'Content-Type':'application/json'
        },

        body: JSON.stringify({

            bloqueo:'desbloqueado'

        })

    });

    alert('Vehículo desbloqueado');

    cargarClientes();

}
// ======================================
// ENCENDER
// ======================================
async function encenderMotor(id){

    await fetch('/vehiculos/' + id + '/motor', {

        method:'PUT',

        headers:{
            'Content-Type':'application/json'
        },

        body: JSON.stringify({
            motor:'encendido'
        })

    });

}
async function bloquearVehiculo(usuario){

    console.log(usuario);

    await fetch('/vehiculos/' + usuario + '/bloqueo', {

        method:'PUT',

        headers:{
            'Content-Type':'application/json'
        },

        body: JSON.stringify({
            bloqueo:'bloqueado'
        })

    });

    alert('Vehículo bloqueado');

}

// ======================================
// GPS
// ======================================

function verGPS(lat,lng,usuario){

    map.setView([lat,lng],18);

    markers.forEach(marker=>{

        const pos = marker.getLatLng();

        if(
            pos.lat === lat &&
            pos.lng === lng
        ){
            marker.openPopup();
        }

    });

}

// ======================================
// ACTUALIZAR
// ======================================

setInterval(async()=>{

    await fetch('/actualizar-gps',{

        method:'PUT'

    });

    cargarClientes();

},5000);

// ======================================
// INICIO
// ======================================

cargarClientes();
function filtrarVehiculos(){

    const texto =
    document.getElementById(
        "buscadorVehiculo"
    ).value.toLowerCase();

    const clientes =
    document.querySelectorAll(".cliente");

    clientes.forEach(cliente => {

        const contenido =
        cliente.innerText.toLowerCase();

        if(contenido.includes(texto)){

            cliente.style.display = "block";

        }else{

            cliente.style.display = "none";

        }

    });

}

</script>

</body>
</html>
