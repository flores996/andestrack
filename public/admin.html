<script>

const map = L.map('map').setView(
    [-1.83, -78.18],
    7
);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; OpenStreetMap contributors'
}).addTo(map);

let markers = [];
const socket = io();
function fechaLimpia(fecha){
    if(!fecha) return "-";
    return String(fecha).split("T")[0];
}

socket.on("nueva-alerta", (alerta) => {
    agregarAlertaPanel(alerta);
});

function agregarAlertaPanel(a){

    const caja = document.getElementById("alertasGenerales");

    const textoSinAlertas = caja.innerText.includes("Sin excesos");

    if(textoSinAlertas){
        caja.innerHTML = "";
    }

    caja.innerHTML = `
        <div class="alerta-item">
            🚨 <b>${a.usuario}</b><br>
            🚘 Placa: ${a.placa}<br>
            ⚡ Velocidad: ${a.velocidad} km/h<br>
            📍 Exceso de velocidad
        </div>
    ` + caja.innerHTML;
}
// ======================================
// ICONOS
// ======================================

function obtenerIcono(tipo){

    let iconoURL =
    'https://cdn-icons-png.flaticon.com/512/3202/3202926.png';

    let tamano = [42,42];

    // AUTO
    if(tipo === 'auto'){

        iconoURL =
        'https://cdn-icons-png.flaticon.com/512/744/744465.png';

        tamano = [42,42];

    }

    // BUS
    if(tipo === 'bus'){

        iconoURL =
        'https://cdn-icons-png.flaticon.com/512/3448/3448339.png';

        tamano = [48,48];

    }

    // MOTO
    if(tipo === 'moto'){

        iconoURL =
        'https://cdn-icons-png.flaticon.com/512/684/684908.png';

        tamano = [38,38];

    }

    // CAMION
    if(tipo === 'camion'){

        iconoURL =
        'https://cdn-icons-png.flaticon.com/512/819/819489.png';

        tamano = [50,50];

    }

    return L.icon({

        iconUrl: iconoURL,

        iconSize: tamano,

        iconAnchor: [
            tamano[0]/2,
            tamano[1]
        ],

        popupAnchor: [0, -40]

    });

}

async function cargarClientes(){

const resTraccar = await fetch("/traccar/vehiculos?nocache=" + Date.now());
const vehiculosTraccar = await resTraccar.json();

const resBase = await fetch("/vehiculos?nocache=" + Date.now());
const vehiculosBase = await resBase.json();

const mapaTraccar = {};

vehiculosTraccar.forEach(t => {
    const imeiTraccar = t.imei || t.uniqueId || t.deviceUniqueId;

    if(imeiTraccar){
        mapaTraccar[String(imeiTraccar)] = {
            ...t,
            imei: String(imeiTraccar)
        };
    }
});

const mapaBase = {};

vehiculosBase.forEach(b => {
    if(b.imei){
        mapaBase[b.imei] = b;
    }
});

const listaFinal = vehiculosTraccar.map(t => {
    const imeiTraccar = t.imei || t.uniqueId || t.deviceUniqueId;
    t.imei = String(imeiTraccar || "");    const base = mapaBase[t.imei];

    if(base){
        return {
            ...t,
            ...base,
            latitud: t.latitud,
            longitud: t.longitud,
            velocidad: t.velocidad,
            estado: t.estado,
            km: t.km,
            motor: t.motor,
            conectado_traccar: true
        };
    }

    return {
        ...t,
        password:"",
        correo:"",
        modelo_gps:"",
        estado_pago:"activo",
        fecha_creacion:"2026-06-10",
        fecha_vencimiento:"2030-12-28",
        conectado_traccar:true
    };
});
    // CONTADORES

   document.getElementById('totalGps').innerText =
listaFinal.length;

    // LIMPIAR CLIENTES
    document.getElementById('clientes').innerHTML = '';

    // BORRAR MARKERS
    markers.forEach(m => map.removeLayer(m));

    markers = [];

    // RECORRER VEHICULOS
    listaFinal.forEach(v => {
       let estadoVisual = "activo";

if(Number(v.velocidad) <= 5){
    estadoVisual = "detenido";
}

if(v.estado === "apagado" && Number(v.velocidad) > 5){
    estadoVisual = "apagado";
}

if(v.estado === "bloqueado" || v.estado_pago === "suspendido"){
    estadoVisual = "apagado";
}

        document.getElementById('clientes').innerHTML += `

<div class="cliente ${estadoVisual}">      
<h3 style="font-size:22px;color:white;margin-bottom:8px;">
👤 ${v.usuario}
</h3>
    <p>📡 GPS: ${v.gps}</p>
    <p>🔑 IMEI: ${v.imei || "No registrado"}</p>
<p>📟 Modelo: ${v.modelo_gps || "No registrado"}</p>
            

            <p>🚗 Placa: ${v.placa}</p>
           <p style="font-size:12px;color:#cbd5e1;">
📅 Creado: ${fechaLimpia(v.fecha_creacion)}
</p>

<p style="font-size:12px;color:#fbbf24;">
⏳ Vence: ${fechaLimpia(v.fecha_vencimiento)}
</p>
            <p>📍 Tipo: ${v.tipo}</p>

          <p>
${
v.estado_pago === "suspendido"
? "⛔ Estado de pago: SUSPENDIDO"
: new Date(v.fecha_vencimiento) < new Date()
? "🔴 Estado de pago: VENCIDO"
: "🟢 Estado de pago: ACTIVO"
}
</p>
<p>📍 Estado visual: ${estadoVisual}</p>
            <p>🔌 Motor: ${v.motor}</p>

            <p>🚀 Velocidad: ${v.velocidad} km/h</p>

            <p>🗺️ KM: ${Number(v.km).toFixed(2)}</p>

<p>
${
v.conectado_traccar
? "✅ GPS conectado a Traccar"
: "⚠️ Sin señal Traccar / IMEI no encontrado"
}
</p>            <div class="acciones">

                <button
class="btn-on"
onclick="encenderMotor('${v.imei}')"
${v.estado === 'bloqueado' ? 'disabled' : ''}>
🟢 ON
</button>


                <button
                class="btn-off"
                onclick="apagarMotor('${v.imei}')">
                🔴 OFF
                </button>

                <button
                class="btn-bloq"
                onclick="bloquearVehiculo('${v.imei}')">
                🔒 Bloq
                </button>

                <button
                class="btn-free"
                onclick="desbloquearVehiculo('${v.imei}')">
                🔓 Free
                </button>

                <button
                class="btn-gps"
                onclick="verGPS(${v.latitud}, ${v.longitud}, '${v.imei}')">
                📍 GPS
                </button>

                <button
class="btn-eliminar"
onclick="eliminarClientePorImei('${v.imei}')">
🗑️ Eliminar
</button>
                <button
onclick="editarCliente('${v.imei}')"
style="background:#0ea5e9;">
✏️ Editar
</button>
<button
onclick="renovarServicio('${v.usuario}')"
style="
background:linear-gradient(90deg,#06b6d4,#22c55e);
color:white;
border:none;
border-radius:12px;
padding:10px;
font-weight:bold;
">
💳 Renovar
</button>
<button
onclick="suspenderServicio('${v.usuario}')"

background:#f59e0b;

⛔ Suspender

✅ Activar

            </div>

        </div>

        `;

        // CREAR MARCADOR
       if(
    !v.conectado_traccar ||
    v.latitud === null ||
    v.longitud === null
){
    return;
}

        const marker = L.marker(
            [v.latitud, v.longitud],
            {
                icon: obtenerIcono(v.tipo)
            }
        ).addTo(map);

        marker.bindPopup(`

            🟢 ${v.estado}<br>
            🔌 ${v.motor}<br>

            🌐 LAT: ${v.latitud}<br>
            🌐 LNG: ${v.longitud}

        `);

        markers.push(marker);

    });

}
async function cargarAlertasGenerales(){

  const caja = document.getElementById("alertasGenerales");

  const res = await fetch("/alertas");
  const alertas = await res.json();

  const alertasValidas = alertas.filter(a =>
    Number(a.velocidad) >= 100
  );

  if(!alertasValidas || alertasValidas.length === 0){
    caja.innerHTML = "✅ Sin excesos de velocidad";
    return;
  }

  caja.innerHTML = alertasValidas.slice(0, 5).map(a => `
    <div class="alerta-item">
      🚗 <b>${a.usuario}</b><br>
      🚘 Placa: ${a.placa}<br>
      ⚡ Velocidad: ${a.velocidad} km/h<br>
      📅 ${a.fecha || ""}<br>
      🕒 ${a.hora || ""}
    </div>
  `).join("");
}

async function crearCliente(){

    const usuario = document.getElementById("usuario").value.trim();
   const password = document.getElementById("password").value.trim();
const correo = document.getElementById("correo").value.trim();
const fecha_vencimiento = document.getElementById("fecha_vencimiento").value;
const gps = document.getElementById("gps").value.trim();
    const placa = document.getElementById("placa").value.trim();
    const imei = document.getElementById("imei").value;
const modelo_gps = document.getElementById("modelo_gps").value;
    const tipo = document.getElementById("tipo").value;

    const adminUsuario = localStorage.getItem("usuario");

if(!usuario || !password || !correo || !fecha_vencimiento || !gps || !placa){        alert("Completa todos los campos");
        return;
    }

    if(!adminUsuario){
        alert("Debes iniciar sesión como admin");
        window.location.href = "/login.html";
        return;
    }

    const res = await fetch("/vehiculos", {
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
       body: JSON.stringify({
    usuario,
    password,
    correo,
    fecha_vencimiento,
    gps,
    imei,
modelo_gps,
    placa,
    tipo,
    adminUsuario,
adminPassword: localStorage.getItem("password")

function filtrarVehiculos(){

    const texto =
    document.getElementById(
        "buscadorVehiculo"
    ).value.toLowerCase();

    const clientes =
    document.querySelectorAll(".cliente");

    clientes.forEach(cliente => {

        const contenido =
        cliente.innerText.toLowerCase();

        if(contenido.includes(texto)){

            cliente.style.display = "block";

        }else{

            cliente.style.display = "none";

        }

    });

}

async function editarCliente(imei){

    const res = await fetch("/traccar/vehiculos?nocache=" + Date.now());
    const lista = await res.json();

    const v = lista.find(x => String(x.imei) === String(imei));

    if(!v){
        alert("No encontré este GPS por IMEI");
        return;
    }

    const usuario = prompt("Usuario / nombre cliente:", v.usuario || "");
    if(!usuario) return;

    const password = prompt("Contraseña del cliente:", v.password || "");
    if(!password) return;

    const correo = prompt("Correo del cliente:", v.correo || "");
    if(!correo) return;

    const fecha_creacion = prompt("Fecha creación YYYY-MM-DD:", fechaLimpia(v.fecha_creacion));
    if(!fecha_creacion) return;

    const fecha_vencimiento = prompt("Fecha vencimiento YYYY-MM-DD:", fechaLimpia(v.fecha_vencimiento));
    if(!fecha_vencimiento) return;

    const gps = prompt("GPS asignado / empresa:", v.gps || "1");
    if(!gps) return;

    const modelo_gps = prompt("Modelo GPS:", v.modelo_gps || "");
    const placa = prompt("Placa:", v.placa || "");
    if(!placa) return;

    const tipo = prompt("Tipo: auto, camion, bus, moto", v.tipo || "auto");
    if(!tipo) return;

    const respuesta = await fetch("/vehiculos/imei/" + imei, {
        method:"PUT",
        headers:{
            "Content-Type":"application/json"
        },
       body: JSON.stringify({
    usuario,
    password,
    correo,
    fecha_creacion,
    fecha_vencimiento,
    gps,
    modelo_gps,
    placa,
    tipo,
    adminUsuario: localStorage.getItem("usuario"),
    adminPassword: localStorage.getItem("password")
})
    });

    const data = await respuesta.json();

    if(data.ok){
        alert("✅ Cliente actualizado correctamente");
        cargarClientes();
    }else{
        alert("❌ No se pudo actualizar");
    }
}
