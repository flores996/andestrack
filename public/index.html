   .panel-izquierdo{

.titulo{

@keyframes glow{

.gps{

.estadisticas{

}

.card{

    <script>

        const socket = io();

const usuario =
localStorage.getItem("usuario") || "true";

document.getElementById(
    "nombreUsuario"
).innerText = usuario;
const gps = localStorage.getItem("gps");

document.getElementById(
    "gpsAsignado"
).innerText = gps;

        const mapa = L.map('map').setView([-1.8312, -78.1834], 7);

        L.tileLayer(
            'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',

            }
        ).addTo(mapa);

        const vehiculos = {};
        async function cargarVehiculosIniciales(){

    try{

        const respuesta = await fetch('/vehiculos');

        const lista = await respuesta.json();

        console.log(lista);

        lista.forEach(data => {

    procesarVehiculo(data);

});

    }catch(error){

        console.log(error);

    }

}
cargarVehiculosIniciales();

socket.on("recibir-ubicacion", (data) => {

    procesarVehiculo(data);

});
        const usuarioLogueado =
        localStorage.getItem("usuario");

        const listaVehiculos =
            document.getElementById("listaVehiculos");

        const activosEl =
            document.getElementById("activos");

        const detenidosEl =
            document.getElementById("detenidos");

        const apagadosEl =
            document.getElementById("apagados");

        const totalEl =
            document.getElementById("totalVehiculos");

        function actualizarContadores() {

            let activos = 0;
            let detenidos = 0;
            let apagados = 0;

            Object.values(vehiculos).forEach(v => {

               if (v.estado === "activo") {

    activos++;

}
else if (
    v.estado === "detenido"
    ||
    v.velocidad <= 5
) {

    detenidos++;

}
else {

    apagados++;

}

            });

            activosEl.innerText = activos;
            detenidosEl.innerText = detenidos;
            apagadosEl.innerText = apagados;

            totalEl.innerText =
                activos + detenidos + apagados;
        }

function procesarVehiculo(data){
    const gpsUsuario =
        localStorage.getItem("gps");

 const admin =
localStorage.getItem("admin");

const esAdmin =
admin === "true";

if(!esAdmin){

    const gpsUsuario =
    localStorage.getItem("gps");

    if(data.gps != gpsUsuario){
        return;
    }
}

    console.log("RECIBIDO:", data);

    const id = data.usuario;

            if (!vehiculos[id]) {

             const iconos = {

    auto: L.icon({

        iconUrl:
        'https://cdn-icons-png.flaticon.com/512/744/744465.png',

        iconSize: [42,42],

        iconAnchor: [21,42],

        popupAnchor: [0,-40]

    }),

    bus: L.icon({

        iconUrl:
        'https://cdn-icons-png.flaticon.com/512/3448/3448339.png',

        iconSize: [48,48],

        iconAnchor: [24,48],

        popupAnchor: [0,-40]

    }),

    moto: L.icon({

        iconUrl:
        'https://cdn-icons-png.flaticon.com/512/684/684908.png',

        iconSize: [38,38],

        iconAnchor: [19,38],

        popupAnchor: [0,-35]

    }),

    camion: L.icon({

        iconUrl:
        'https://cdn-icons-png.flaticon.com/512/819/819489.png',

        iconSize: [50,50],

        iconAnchor: [25,50],

        popupAnchor: [0,-45]

    })

};

               const marker = L.marker(
[
    data.latitud,
    data.longitud
],
{
    icon:
        iconos[data.tipo] ||
        iconos.auto,
    rotationAngle: 0
}
).addTo(mapa);
               marker.bindPopup(`

    <div style="width:220px">

        <h3 style="
            margin-bottom:10px;
            color:#00bfff;

            ${id}
        </h3>

        <p>
            <b>Placa:</b>
            ${data.placa}

            ${data.tipo}

        <p>
            <b>Velocidad:</b>
            ${data.velocidad} km/h
        </p>

        <p>
            <b>Estado:</b>
            ${data.estado}
        </p>

        <p>
            <b>Kilómetros:</b>
            ${data.km}
        </p>

        <p>
            <b>GPS:</b>
            ${data.gps}
        </p>

    </div>

`);

                vehiculos[id] = {
                    marker,
                    estado: data.estado
                };

                const item =
                    document.createElement("div");

                item.className =
                 "vehiculo-item estado-" +data.estado;


                item.id = "item-" + id;

                item.innerHTML = `

<div style="
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:8px;
">

<h3 id="nombre-${id}">
${
localStorage.getItem(
    "vehiculo-" + id
) || id
}
</h3>

${id === "true" ? "" : `

<button
onclick="editarVehiculo('${id}')"
style="
padding:5px 10px;
font-size:11px;
background:#2563eb;
border:none;
border-radius:8px;
color:white;
cursor:pointer;
">
✏️
</button>

`}

</div>
    <p>
        Velocidad:
        <span id="vel-${id}">
        ${data.velocidad}
        </span>
        km/h
    </p>

    <p>
        Estado:
        <span id="estado-${id}">
        ${data.estado}
        </span>
    </p>

    <div class="controles-motor">

<button
onclick="encenderMotor('${id}')"
class="btn-on"
${data.estado === 'bloqueado' ? 'disabled' : ''}
style="${data.estado === 'bloqueado'
? 'background:#8b6f47; cursor:not-allowed; opacity:0.7;'
: 'background:#27ae60;'}"
>

</button>

<button
onclick="apagarMotor('${id}')"
class="btn-off">
🔴 OFF
</button>

<button
onclick="bloquearVehiculo('${id}')"
class="btn-lock">
🔒 Bloq
</button>

<button
onclick="desbloquearVehiculo('${id}')"
class="btn-unlock">
🔓 Free
</button>

<button
onclick="verGPS(${data.latitud}, ${data.longitud})"
class="btn-gps">
📍 GPS
</button>

<button
onclick="toggleHistorial('${id}')"
class="btn-gps">
📋 Historial
</button>

</div>

<div
id="panel-historial-${id}"
style="
display:none;
margin-top:10px;
">

<input
type="datetime-local"
id="desde-${id}"
style="
width:100%;

">

id="hasta-${id}"

<div

<div
id="historial-${id}"
style="
margin-top:10px;
">
</div>

</div>
`;
listaVehiculos.appendChild(item);
                listaVehiculos.appendChild(item);

            } else {

             const markerActual = vehiculos[id].marker;

const latAnterior =
markerActual.getLatLng().lat;

const lngAnterior =
markerActual.getLatLng().lng;

const angulo = Math.atan2(
    data.longitud - lngAnterior,
    data.latitud - latAnterior
) * 180 / Math.PI;

markerActual.setRotationAngle(
    angulo
);

markerActual.setLatLng([
    data.latitud,
    data.longitud
]);

                document.getElementById(
                    "vel-" + id
                ).innerText = data.velocidad;

                document.getElementById(
                    "estado-" + id
                ).innerText = data.estado;

                vehiculos[id].estado = data.estado;
                if(data.velocidad <= 5 && data.motor === "encendido"){

    data.estado = "detenido";

}
             let estadoVisual = data.estado;

if(
    data.velocidad <= 5
    &&
    data.motor === "encendido"
){

    estadoVisual = "detenido";

}

document.getElementById(
    "item-" + id
).className =
    "vehiculo-item estado-" + estadoVisual;
            }

            actualizarContadores();

            if (data.velocidad > 100) {

               const alerta = document.createElement("div");

alerta.innerHTML = `

    position:fixed;
    top:20px;
    left:50%;
    transform:translateX(-50%);
    background:#ff2d55;
    color:white;
    padding:18px 30px;
    border-radius:15px;
    font-size:18px;
    z-index:99999;
    box-shadow:0 0 20px rgba(255,0,0,0.5);
">
⚠️ Exceso de velocidad de ${id}: 
${data.velocidad} km/h
</div>
`;

document.body.appendChild(alerta);

setTimeout(() => {
    alerta.remove();
}, 3000);
            }

        }
socket.on("recibir-ubicacion", (data) => {

    procesarVehiculo(data);

});

cargarVehiculosIniciales();
        const buscador =
            document.getElementById("buscador");
            socket.on("recibir-ubicacion", (data) => {

    procesarVehiculo(data);

});

        buscador.addEventListener("input", function () {

            const texto =
                this.value.toLowerCase();

            const items =
                document.querySelectorAll(".vehiculo-item");

            items.forEach(item => {

                if (
                    item.innerText.toLowerCase()
                    .includes(texto)
                ) {
                    item.style.display = "block";
                }
                else {
                    item.style.display = "none";
                }

            });

        });
        

    mostrarAlerta(
        "Motor encendido"
    );

async function apagarMotor(usuario){

    await fetch(
        "/vehiculos/" + usuario + "/motor",
        {
            method:"PUT",

            headers:{
                "Content-Type":
                "application/json"
            },

            body: JSON.stringify({
                motor:"apagado"
            })
        }
    );

    mostrarAlerta(
        "Motor apagado de " + usuario
    );
}

async function encenderMotor(usuario){
if(vehiculos[usuario].estado === "bloqueado"){

 mostrarAlerta(
    "⚠️ Vehículo bloqueado. Primero desbloquee el auto.",
    "error"
);

    return;
}

    await fetch(
        "/vehiculos/" + usuario + "/motor",
        {
            method:"PUT",

            headers:{
                "Content-Type":"application/json"
            },

            body: JSON.stringify({
                motor:"encendido"
            })
        }
    );

    mostrarAlerta(
        "Motor encendido de " + usuario
    );

}

async function bloquearVehiculo(usuario){

    await fetch('/vehiculos/' + usuario + '/bloqueo', {

        method:'PUT',

        headers:{
            'Content-Type':'application/json'
        },

        body: JSON.stringify({

            bloqueo:'bloqueado'

        })

async function consultarRecorrido(usuario){

    const desde = document.getElementById(
        "desde-" + usuario
    ).value;

    const hasta = document.getElementById(
        "hasta-" + usuario
    ).value;

    const respuesta = await fetch(
        `/recorrido/${usuario}?desde=${desde}&hasta=${hasta}`
    );

    const data = await respuesta.json();

    console.log(data);

    if (!data.puntos || data.puntos.length < 2) {

        mostrarAlerta(
            "No hay suficientes puntos GPS"
        );

        return;
    }

    // =========================
    // CALCULAR KM
    // =========================

    let total = 0;

    for (let i = 1; i < data.puntos.length; i++) {

        const p1 = data.puntos[i - 1];
        const p2 = data.puntos[i];

        const dx = p2.latitud - p1.latitud;
        const dy = p2.longitud - p1.longitud;

        total += Math.sqrt(
            dx * dx + dy * dy
        ) * 111;
    }

    // =========================
    // MOSTRAR KM
    // =========================

    document.getElementById(
        "recorrido-" + usuario
    ).innerHTML =
    `🚗 Recorrió: ${total.toFixed(2)} km`;

    // =========================
    // CREAR COORDENADAS
    // =========================

    const coordenadas = data.puntos.map(p => [
        p.latitud,
        p.longitud
    ]);

    // =========================
    // BORRAR RUTA ANTERIOR
    // =========================

    if (window.rutaMapa) {

        mapa.removeLayer(window.rutaMapa);

    }

    // =========================
    // DIBUJAR RUTA
    // =========================

    window.rutaMapa = L.polyline(
        coordenadas,
        {
            color:'#00d4ff',
            weight:5,
            opacity:0.8,
            smoothFactor:2
        }
    ).addTo(mapa);

    // =========================
    // BORRAR VEHÍCULO ANTERIOR
    // =========================

    if (window.marcadorAnimado) {

        mapa.removeLayer(window.marcadorAnimado);

    }

    // =========================
    // CREAR VEHÍCULO
    // =========================

    window.marcadorAnimado = L.marker(
        coordenadas[0]
    ).addTo(mapa);

    // =========================
    // ANIMAR VEHÍCULO
    // =========================

    let paso = 0;

const animacion = setInterval(() => {

    paso++;

    if (paso >= coordenadas.length) {

        clearInterval(animacion);

        return;
    }

    window.marcadorAnimado.setLatLng(
        coordenadas[paso]
    );

}, 120);

    // =========================
    // AJUSTAR MAPA
    // =========================

    mapa.fitBounds(
        window.rutaMapa.getBounds()
    );

}
