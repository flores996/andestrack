function fechaLimpia(fecha){
    if(!fecha) return "-";
    return String(fecha).split("T")[0];
}

if(!usuario){
   window.location.href="/login.html";
}
async function validarAccesoCliente(){
    const esAdmin = localStorage.getItem("admin") === "true";
    const usuarioActual = localStorage.getItem("usuario");

    if(esAdmin){
        return;
    }

    const respuesta = await fetch("/validar-cliente", {
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body: JSON.stringify({
            usuario: usuarioActual
        })
    });

    const data = await respuesta.json();

    if(!data.ok){
        alert(data.error || "Servicio vencido. Comunícate con el administrador.");
        localStorage.clear();
        window.location.href = "/login.html";
    }
}

                String(v.usuario).trim().toLowerCase() ===
                String(usuarioActual).trim().toLowerCase()

    let activos = 0;
    let detenidos = 0;
    let apagados = 0;

    Object.values(vehiculos).forEach(v => {

        if (v.estado === "activo") {
            activos++;
        }

            v.estado === "detenido"

            Number(v.velocidad) <= 5
        ) {
            detenidos++;
        }
        else {
            apagados++;
        }

    });

    activosEl.innerText = activos;
    detenidosEl.innerText = detenidos;
    apagadosEl.innerText = apagados;

    totalEl.innerText = activos + detenidos + apagados;
}

    const respuesta = await fetch("/historial/" + usuario);

        html += `

}

async function consultarRecorrido(usuario){

    const desde = document.getElementById("desde-" + usuario).value;
    const hasta = document.getElementById("hasta-" + usuario).value;

    const respuesta = await fetch(
        `/recorrido/${usuario}?desde=${desde}&hasta=${hasta}`
    );

    const data = await respuesta.json();

    console.log(data);

    if (!data.puntos || data.puntos.length < 2) {

        mostrarAlerta(
            "No hay suficientes puntos GPS"
        );

        return;
    }

    let total = 0;

    for (let i = 1; i < data.puntos.length; i++) {

        const p1 = data.puntos[i - 1];
        const p2 = data.puntos[i];

        const dx = Number(p2.latitud) - Number(p1.latitud);
        const dy = Number(p2.longitud) - Number(p1.longitud);

        total += Math.sqrt(
            dx * dx + dy * dy
        ) * 111;
    }

    document.getElementById("recorrido-" + usuario).innerHTML =
    `🚗 Recorrió: ${total.toFixed(2)} km`;

    const coordenadas = data.puntos.map(p => [
        Number(p.latitud),
        Number(p.longitud)
    ]);

    if (window.rutaMapa) {
        mapa.removeLayer(window.rutaMapa);
    }

    window.rutaMapa = L.polyline(
        coordenadas,
        {
            color:'#00d4ff',
            weight:5,
            opacity:0.8,
            smoothFactor:2
        }
    ).addTo(mapa);

    if (window.marcadorAnimado) {
        mapa.removeLayer(window.marcadorAnimado);
    }

    window.marcadorAnimado = L.marker(
        coordenadas[0]
    ).addTo(mapa);

    let paso = 0;

    const animacion = setInterval(() => {

        paso++;

        if (paso >= coordenadas.length) {
            clearInterval(animacion);
            return;
        }

        window.marcadorAnimado.setLatLng(
            coordenadas[paso]
        );

    }, 120);

    mapa.fitBounds(
        window.rutaMapa.getBounds()
    );

}

async function cargarGeocercas(usuario){

    const respuesta = await fetch("/geocercas/" + usuario);
    const geocercas = await respuesta.json();

    if(geocercasMapa[usuario]){
        geocercasMapa[usuario].forEach(g => {
            mapa.removeLayer(g);
        });
    }

    geocercasMapa[usuario] = [];

    geocercas.forEach(g => {

        const circulo = L.circle(
            [Number(g.latitud), Number(g.longitud)],
            {
                radius: Number(g.radio),
                color: "#ff00ff",
                fillColor: "#ff00ff",
                fillOpacity: 0.25,
                weight: 3
            }
        ).addTo(mapa);

        circulo.bindPopup(`
    <b>${g.nombre}</b><br>
    Radio: ${g.radio} metros<br>
    Vehículo: ${g.usuario}<br><br>

    <button onclick="editarGeocerca(${g.id})">
        ✏️ Editar
    </button>

    <button onclick="eliminarGeocerca(${g.id}, '${g.usuario}')">
        🗑️ Eliminar
    </button>
`);

        geocercasMapa[usuario].push(circulo);
    });
}

    const radio = prompt("Radio en metros:", "200");

    if(!radio){
        return;
    }

    const respuesta = await fetch("/geocerca", {
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body: JSON.stringify({
            usuario,
            nombre,
            latitud,
            longitud,
            radio
        })
    });

    const data = await respuesta.json();

   if(data.ok){
        mostrarAlerta("✅ Geocerca creada correctamente");
        cargarGeocercas(usuario);
        mapa.setView([latitud, longitud], 16);
    }else{
        mostrarAlerta("❌ No se pudo crear geocerca");
    }
}
